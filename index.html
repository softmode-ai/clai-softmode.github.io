<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CL[AI] — Soft Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Franklin:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #ede5de;
      color: #1a1a1a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    nav .brand { font-family: 'Bebas Neue', sans-serif; font-weight: 400; font-size: 1.1rem; letter-spacing: 0.05em; }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav ul li a {
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 500;
      text-decoration: none;
      color: inherit;
      letter-spacing: 0.08em;
    }

    nav ul li a:hover { text-decoration: underline; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 2.5rem;
      max-width: 900px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 400;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 2.5rem;
    }

    h1 em {
      font-style: normal;
      text-decoration: line-through;
      text-decoration-thickness: 3px;
    }

    p {
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 38ch;
      color: #444;
      margin-bottom: 3rem;
    }

    .cta {
      display: inline-block;
      border: 1.5px solid #1a1a1a;
      padding: 0.75rem 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .cta:hover {
      background: #1a1a1a;
      color: #ede5de;
    }

    footer {
      padding: 1.5rem 2.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <nav>
    <span class="brand">CL[AI]</span>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">System</a></li>
      <li><a href="#">Research</a></li>
      <li><a href="#">Partner</a></li>
    </ul>
  </nav>

  <main>
    <h1>Hello,<br>World<em>.</em></h1>
    <p>
      Clay is a very intelligent material.<br>
      A new programming language for AI — where sculptural form becomes interface, and the object becomes the prompt.
    </p>
    <a class="cta" href="#">Enter the language &rarr;</a>
  </main>

  <footer>
    <span>CL[AI] &mdash; Soft Mode</span>
    <span>Sculpting Intelligence</span>
  </footer>

</body>
</html>
